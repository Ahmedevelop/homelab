# ----- Prometheus -----
prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "15GiB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-storage     # <<< storageClass
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    scrapeInterval: 30s
    evaluationInterval: 30s

# ----- Alertmanager -----
alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: nfs-storage    
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: 'default'
      group_by: ['alertname','namespace','job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
      routes:
      - matchers:
          - severity="critical"
        receiver: 'critical'
    receivers:
    - name: 'default'
      # Slack/Email/Telegram:
      # slack_configs:
      # - api_url: '<webhook>'
      #   channel: '#alerts'
    - name: 'critical'
      # pagerduty_configs:
      # - routing_key: '<pd-key>'

# ----- Grafana -----
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin          # from ESO
    userKey: grafana-user
    passwordKey: grafana-password
  persistence:
    enabled: true
    type: pvc
    storageClassName: nfs-storage            # <<<  storageClass
    accessModes: ["ReadWriteOnce"]
    size: 5Gi
  service:
    type: ClusterIP
    port: 3000
  # datasource Prometheus 
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      url: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
      access: proxy
      isDefault: false
  ingress:
    enabled: true
    ingressClassName: traefik-internal
    hosts:
      - grafana.devirthas.com

# Kube-state-metrics и node-exporter 
kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

