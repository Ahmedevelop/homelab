---
crds:
  enabled: true
  # keep CRDs on uninstall so Certificates/Issuers aren't wiped with them
  keep: true
replicaCount: 1
extraArgs:
  - --dns01-recursive-nameservers=1.1.1.1:53,9.9.9.9:53
  - --dns01-recursive-nameservers-only
podDnsPolicy: None
podDnsConfig:
  nameservers:
    - "1.1.1.1"
    - "9.9.9.9"

prometheus:
  enabled: true
  servicemonitor:
    enabled: true
    labels:
      # kube-prometheus-stack only picks up ServiceMonitors with its release label
      release: monitoring
startupapicheck:
  enabled: true
  serviceAccount:
    create: true
    name: ""